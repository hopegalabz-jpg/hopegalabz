		// 2. THE GALLERY GENERATOR FUNCTION
		function loadGallery(containerId, folderPath, imageList) {
			const container = document.getElementById(containerId);
			if (!container || imageList.length === 0) return;

			// Create the 3 "dream" column divs
			const col1 = document.createElement('div'); col1.className = 'dream';
			const col2 = document.createElement('div'); col2.className = 'dream';
			const col3 = document.createElement('div'); col3.className = 'dream';
			const columns = [col1, col2, col3];

			// Loop through the list and distribute them evenly across the 3 columns
			imageList.forEach((filename, index) => {
				const img = document.createElement('img');
				img.src = `${folderPath}/${filename}`;
				img.loading = "lazy"; // Lazy loading helps the page load much faster
				
				// Cycle through columns 0, 1, 2
				columns[index % 3].appendChild(img);
			});

			// Add the columns to the container
			container.appendChild(col1);
			container.appendChild(col2);
			container.appendChild(col3);
		}

		// 3. RUN THE GENERATOR FOR EVERY SECTION
